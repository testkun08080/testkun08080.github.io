name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure Linux native binaries are present
        run: npm install --no-save @tailwindcss/oxide-linux-x64-gnu @rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu

      - name: Typecheck
        run: npm run typecheck
        working-directory: app

      - name: Lint
        run: npm run lint
        working-directory: app

      - name: Test
        run: npm run test:run
        working-directory: app

      - name: Build static site
        run: npm run build:pages
        working-directory: app

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
